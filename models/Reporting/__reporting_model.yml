version: 2

models:
  - name: average_sales_per_store
    description: "hold total sales per store"
    columns:
      - name: store_id
        description: "The primary key for this table"
        tests:
          - unique
          - not_null
      - name: store_name
        description: "store location"
        tests:
          - not_null     
      - name: total_sales
        description: "sales generated by store location"
        tests:
          - not_null